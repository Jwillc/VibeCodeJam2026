<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick World</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .hud-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hud-label {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 0 #000;
            width: 14px;
        }
        .hud-track {
            width: 140px;
            height: 8px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            overflow: hidden;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: #c0392b;
            border-radius: 4px;
            transition: width 0.15s;
        }
        #stamina-fill {
            width: 100%;
            height: 100%;
            background: #e8c840;
            border-radius: 4px;
            transition: width 0.1s;
        }
        #hunger-fill {
            width: 100%;
            height: 100%;
            background: #e67e22;
            border-radius: 4px;
            transition: width 0.15s;
        }
        #thirst-fill {
            width: 100%;
            height: 100%;
            background: #3498db;
            border-radius: 4px;
            transition: width 0.15s;
        }
        #action-menu {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: none;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            color: rgba(255,255,255,0.85);
            text-shadow: 1px 1px 0 #000;
            background: rgba(0,0,0,0.45);
            border-radius: 6px;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            white-space: nowrap;
        }
        .action-item {
            padding: 2px 6px;
            border-radius: 3px;
        }
        .action-item.selected {
            background: rgba(255,255,255,0.15);
        }
        .action-key {
            display: inline-block;
            width: 16px;
            height: 16px;
            line-height: 16px;
            text-align: center;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-right: 6px;
            font-size: 10px;
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-shadow: 1px 1px 0 #000;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-bar">
            <span class="hud-label">HP</span>
            <div class="hud-track"><div id="health-fill"></div></div>
        </div>
        <div class="hud-bar">
            <span class="hud-label">SP</span>
            <div class="hud-track"><div id="stamina-fill"></div></div>
        </div>
        <div class="hud-bar">
            <span class="hud-label">HN</span>
            <div class="hud-track"><div id="hunger-fill"></div></div>
        </div>
        <div class="hud-bar">
            <span class="hud-label">TH</span>
            <div class="hud-track"><div id="thirst-fill"></div></div>
        </div>
    </div>
    <div id="action-menu"></div>
    <div id="controls-hint">A/D Move &bull; W/S Forward/Back &bull; Shift Sprint</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
